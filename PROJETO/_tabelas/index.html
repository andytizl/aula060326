<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Multimarcas | Vendas</title>
    <style>
        body {
            margin: 0px;
            padding: 30px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            color: #222;
        }
        .container {
            max-width: 1000px
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px rgba(0, 0, 0, 0.12);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        p.descricao {
            text-align: center;
            font-size: 30px;
            color: #555;
        }
        .imagem-topo {
            display: block;
            width: 180px;
            margin: 0 auto 20px auto;
            border-radius: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }
        thead th {
            background-color: #dcdcdc;
            font-weight: bold;
        }
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tfoot td {
            background-color: #efefef;
            font-weight: bold;
            text-align: center;
        }
        .col-marca {
            width: 30%;
        }
        .col-modelo {
            width: 40%;
        }
        .col-ano {
            width: 30%;
        }
        .imagem-carros {
            display: flex;
            align-items: center;
            gap: 10px;            
        }
        .imagem-carros img {
            width: 70px;
            height: 45px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .rodape {
            display: block;
            width: 120px;
            margin: 25px auto 0 auto;
            opacity: 0.9;
        }

    </style>
</head>
<body>
    <div class="container">
        <img class="imagem-topo" src="./img/mitsubishi_lancer.jpg" alt="Lancer 2023">

        <h1>Modelos de Carros em estoque | Vendas</h1>
        <p class="descricao">
            Tabelas de veículos disponíveis em estoque, multimarcas!
        </p>
        <table>
            <thead>
                <tr>
                    <th class="col-marca">Marca</th>
                    <th class="col-modelo">Modelo</th>
                    <th class="col-ano">Ano</th>
                </tr>
            </thead>
            <!--Inicio tbody-->
            <tbody>
                <!--Veículos Toyota-->
                <tr>
                    <td rowspan="2">Toyota</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/toyota_corolla.jpg" alt="Corolla 2023">
                            <span>Corolla 2023</span>
                        </div>
                    </td>
                    <td>2023</td>
                </tr>
                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/toyota-Yaris-2020.jpg"" alt="Yaris 2020">
                            <span>Yaris 2020</span>
                        </div>
                    </td>
                    <td>2020</td>
                </tr>
                <!--Fim veículos Toyota-->

                <!--Veículos Mitsubishi-->
                <tr>
                    <td rowspan="2">Mitsubishi</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/mitsubishi_lancer.jpg" alt="Lancer 2023">
                            <span>Lancer 2023</span>
                        </div>
                    </td>
                    <td>2023</td>
                </tr>
                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/mitsubichi_xforce.jpg" alt="X-Force 2023">
                            <span>X-Force 2026</span>
                        </div>
                    </td>
                    <td>2026</td>
                </tr>
                <!--Fim veículos Mitsubishi-->

                <!--Inicio Veículos Chevrolet-->
                <tr>
                    <td rowspan="2">Chevrolet</td>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/chevrolet_cruze.jpeg" alt="Cruze 2024">
                            <span>Cruze 2024</span>
                        </div>
                    </td>
                    <td>2024</td>
                </tr>
                <tr>
                    <td>
                        <div class="imagem-carros">
                            <img src="./img/chevrolet_onix.jpeg" alt="Onix 2025">
                            <span>Onix 2023</span>
                        </div>
                    </td>
                    <td>2025</td>
                </tr>
                <!--Fim veículos Chevrolet-->

            </tbody>

            <tfoot>
                <tr>
                    <td colspan="3">Ultima atualização: 27/03/2026</td>
                </tr>
            </tfoot>

        </table>
        <img class="rodape" src="./img/logo-carro.avif" alt="Logo Max Multimarcas">

    </div>
    
</body>
</html>
